# ===== mkdocs.yml =====
# Configuration file for the automatic generation of package
# documentation formatted with markdown.

# ===== Setup and Themes =====
markdown_extensions:
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

site_name: drpangloss - the best of all possible interferometry models
repo_url: https://github.com/benjaminpope/drpangloss

theme:
  name: material
  palette:
    scheme: slate
  icon:
    logo: material/telescope

exclude_docs: |
  review_2026-03-03.md

# ===== Plugins =====
plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: numpy
            show_source: false
            show_if_no_docstring: true
            members_order: source
            show_category_heading: false

# ===== Navigation =====
nav:
  - Home: index.md
  - Synthetic Data Roundtrip: synthetic_data_file_roundtrip.md
  - Binary Recovery (Grid + HMC): binary_recovery_grid_hmc.md
  - Contrast Limits (Ruffio): contrast_limits_ruffio.md
  - API Reference:
      - Overview: api/index.md
      - Models:
          - Overview: api/models/index.md
          - Classes:
              - OIData: api/models/classes/oidata.md
              - BinaryModelAngular: api/models/classes/binary_model_angular.md
              - BinaryModelCartesian: api/models/classes/binary_model_cartesian.md
          - Functions: api/models/functions.md
      - Grid Fit: api/grid_fit.md
      - Inference: api/inference.md
      - Plotting: api/plotting.md
      - SaveFITS: api/savefits.md
      - OIFITS ImplaneIA: api/oifits_implaneia.md
