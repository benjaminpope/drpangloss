# ===== mkdocs.yml =====
# Configuration file for the automatic generation of package
# documentation formatted with markdown.

# ===== Setup and Themes =====
markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

site_name: drpangloss - the best of all possible interferometry models
repo_url: https://github.com/benjaminpope/drpangloss

theme:
  name: material
  icon:
    logo: material/telescope

# ===== Plugins =====
plugins:
  - search
  - mkdocs-jupyter:
      include:
        - "*.ipynb"
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: numpy
            show_source: false
            show_if_no_docstring: true

# ===== Navigation =====
nav:
  - Home: index.md
  - Synthetic Data Roundtrip: synthetic_data_file_roundtrip.md
  - Binary Recovery (Grid + HMC): binary_recovery_grid_hmc.md
  - Contrast Limits (Ruffio): contrast_limits_ruffio.md
  - API Reference: api.md
  - Review Log: review_2026-03-03.md
