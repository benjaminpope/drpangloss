# Author: Jordan Dennis 
# Date: 07/07/2022
# Title: documentation.yml
# Description: Automatically generates the docs on a merge.

name: Documentation
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  documentation:
    runs-on: ubuntu-latest
    steps: 
      - name: checkout all
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: install uv
        uses: astral-sh/setup-uv@v6


      - name: python install 
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          architecture: x64

      - name: create environment
        run: |
          uv venv --python 3.11 .venv
          uv pip install --python .venv/bin/python -e . mkdocs mkdocstrings mkdocstrings[python] mkdocs-material mkdocs-jupyter pytest

      - name: generate and deploy documentation
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: uv run --python .venv/bin/python mkdocs gh-deploy

      - name: build documentation
        if: github.event_name == 'pull_request'
        run: uv run --python .venv/bin/python mkdocs build --strict

      - name: validate synthetic docs workflow
        run: uv run --python .venv/bin/python pytest tests/test_docs_synthetic_recovery.py

